<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Health Pilot</title>

  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="assets/favicon-source.png">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0ea5e9">
</head>

<body>

<header class="app-header">
  <img src="assets/logo.png" alt="Health Pilot Logo" class="brand-logo">
  <p class="tagline">健康を、もっとシンプルに。</p>
  <p class="subtagline">Your Personal AI Health Copilot</p>
</header>

<div class="container">

  <div class="greeting">
    <h2>☀️ おはようございます！</h2>
    <p>今日はこのMissionだけに集中しましょう。</p>
  </div>

  <!-- Mission First -->
  <div class="card">
    <h3>🎯 今日のMission</h3>

    <ul id="mission-list" class="mission-list">
    </ul>
  </div>

  <!-- Health Score -->
  <div class="card score">
    <h3>Health Score</h3>
    <div id="score">89</div>
    <p>理想まであと6点</p>
  </div>

  <!-- AI Comment -->
  <div class="card">
    <h3>🤖 AIコメント</h3>
    <p id="ai-comment">
      昨日は回復が良好でした。<br>
      今日は睡眠だけ意識すれば十分です😊
    </p>
  </div>

</div>

<script src="js/healthEngine.js"></script>
<script src="js/healthDataAdapter.js"></script>
<script src="js/contextBuilder.js"></script>
<script src="js/builtInAI.js"></script>
<script src="app.js"></script>
<script src="js/main.js"></script>

</body>
</html>
