<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Health Pilot</title>

  <link rel="stylesheet" href="style.css">

</head>
<body>

<div class="container">

  <div class="greeting">
    <h2>☀️ おはようございます！</h2>
    <p>今日は睡眠を優先しましょう。</p>
  </div>

  <div class="card score">

    <h3>Health Score</h3>

    <div id="score">89</div>

    <p>理想まであと6点</p>

  </div>

  <div class="card">

    <h3>🎯 今日のMission</h3>

    <ul id="mission-list">
      <li>★★★★★ 23:45までに寝る</li>
      <li>★★★★☆ あと2,300歩</li>
      <li>★★★☆☆ レオピンファイブを朝夕服用</li>
    </ul>

  </div>

  <div class="card">

    <h3>📈 今日の健康予報</h3>

    <p>
      今日のMissionを達成すると、
      Health Scoreは
      <strong>93点</strong>
      の見込みです。
    </p>

  </div>

  <div class="card">

    <h3>🤖 AIコメント</h3>

    <p id="ai-comment">
      昨日は回復が良好でした。<br>
      今日は睡眠だけ意識すれば十分です😊
    </p>

  </div>

</div>

<script src="app.js"></script>

</body>
</html>
